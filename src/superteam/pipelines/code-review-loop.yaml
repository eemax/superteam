name: code-review-loop
version: "1"
description: Builder writes code, auditor reviews it, loop until pass.

loop:
  max_iterations: 5
  min_score: 0.85
  consecutive_passes: 1
  on_max_iterations: fail

agents:
  builder:
    module: claude_code
    model: claude-opus-4-1
    system: |
      You are an expert software engineer.
      Write clean, tested, well-documented code.
    bare: true
  auditor:
    module: codex
    system: |
      You are a strict senior code reviewer.
      Produce a decisive software engineering audit report.
      Return only the canonical Markdown audit report with YAML frontmatter.

input:
  goal: null
  plan: null
