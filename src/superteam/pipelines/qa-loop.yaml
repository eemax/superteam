name: qa-loop
version: "1"
description: Cross-module QA with a full builder module and a full auditor module.

loop:
  max_iterations: 5
  min_score: 0.9
  consecutive_passes: 1
  on_max_iterations: fail

agents:
  builder:
    module: codex
    system: |
      You are an expert builder. Execute the plan precisely.
      Produce complete, working output.

  auditor:
    module: claude_code
    model: claude-opus-4-1
    system: |
      You are a rigorous QA auditor. Be precise and critical.
      Return only the canonical Markdown audit report with YAML frontmatter.
    bare: true
