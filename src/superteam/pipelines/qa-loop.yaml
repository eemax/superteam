name: qa-loop
version: "1"
description: Cross-provider QA — builder and evaluator from different providers.

loop:
  max_iterations: 5
  min_score: 0.9
  consecutive_passes: 1
  on_max_iterations: fail

agents:
  builder:
    provider: claude_code
    model: claude-opus-4-1
    system: |
      You are an expert builder. Execute the plan precisely.
      Produce complete, working output.
    # max_turns is not supported by Claude Code print mode

  evaluator:
    provider: openrouter
    model: openai/gpt-4o
    system: |
      You are a rigorous QA evaluator. Be precise and critical.
      Return JSON only: {status, feedback, score}
    temperature: 0.1
